<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文章清理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .panel { display: flex; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .panel-title { font-size: 1.3rem; font-weight: 600; color: #333; }
        .panel-actions { display: flex; gap: 10px; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        textarea {
            flex: 1; min-height: 500px; padding: 15px;
            border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 1rem; line-height: 1.8; resize: none;
            transition: all 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        #inputTextarea { background: #f9fafb; }
        #outputTextarea { background: #f0fdf4; }
        .stats { margin-top: 15px; padding: 15px; background: #f3f4f6; border-radius: 8px; font-size: 0.9rem; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .stats-label { color: #6b7280; }
        .stats-value { font-weight: 600; color: #333; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 0.9rem; z-index: 1000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            textarea { min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI文章清理工具</h1>
            <p>粘贴原文，自动清理不相关内容并统一章节编号</p>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">输入原文</div>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" id="clearBtn">清空</button>
                        <button class="btn btn-primary" id="processBtn">清理文章</button>
                    </div>
                </div>
                <textarea id="inputTextarea" placeholder="在这里粘贴原文..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">清理结果</div>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" id="copyBtn">复制</button>
                        <button class="btn btn-success" id="downloadBtn">下载</button>
                    </div>
                </div>
                <textarea id="outputTextarea" placeholder="清理后的文章将显示在这里..." readonly></textarea>

                <div class="stats" id="stats" style="display: none;">
                    <div class="stats-row">
                        <span class="stats-label">总行数:</span>
                        <span class="stats-value" id="statTotal">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">删除行数:</span>
                        <span class="stats-value" id="statRemoved">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">转换章节:</span>
                        <span class="stats-value" id="statConverted">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        try {
            console.log('AI文章清理工具 - 开始初始化');

            // 中文数字映射
            var chineseToNum = {
                '一': '1', '二': '2', '三': '3', '四': '4',
                '五': '5', '六': '6', '七': '7', '八': '8',
                '九': '9', '十': '10', '十一': '11', '十二': '12',
                '十三': '13', '十四': '14', '十五': '15', '十六': '16',
                '十七': '17', '十八': '18', '十九': '19', '二十': '20'
            };

            function showToast(message) {
                var toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(function() {
                    toast.classList.remove('show');
                }, 2000);
            }

            // 判断是否应该跳过行 - 更严格的规则
            function shouldSkipLine(line) {
                if (!line || line.trim() === '') return false;

                var lineTrimmed = line.trim();
                var lineLower = line.toLowerCase();

                // AI标记和说明
                if (lineTrimmed.indexOf('【') === 0 && lineTrimmed.indexOf('】') > 0) return true;
                if (lineTrimmed === '# 思考过程' || lineTrimmed === '# 写作思路' || lineTrimmed === '# 创作理念') return true;
                if (lineTrimmed === '思考：' || lineTrimmed === '创意说明：' || lineTrimmed === '写作说明：' || lineTrimmed === '补充说明：') return true;

                // 用户指令和AI开头语（中文）
                var userCommands = ['根据您的要求', '基于以上', '我会', '让我', '好的', '当然', '当然可以',
                                      '为您创作', '为你撰写', '我为您', '我会为您',
                                      '好的，我', '没问题，我', '现在为您', '开始为您'];
                for (var i = 0; i < userCommands.length; i++) {
                    if (lineTrimmed.indexOf(userCommands[i]) === 0) return true;
                }

                // AI结尾客套
                var aiEndings = ['希望能对您有所帮助', '希望这篇文章', '希望这些内容', '供您参考', '仅供参考',
                                   '希望对您有帮助', '希望这篇文章能帮助到'];
                for (var j = 0; j < aiEndings.length; j++) {
                    if (lineTrimmed.indexOf(aiEndings[j]) >= 0) return true;
                }

                // 解释性内容（中文）
                var explanations = ['这是一个', '这是一个关于', '以上是', '这里我',
                                         '这段话旨在', '这段内容主要', '本段',
                                         '通过以上', '综上所述', '总之', '简而言之', '总而言之',
                                         '需要注意的是', '需要说明的是', '值得注意的是',
                                         '这里是对', '这章是', '这一节是'];
                for (var k = 0; k < explanations.length; k++) {
                    if (lineTrimmed.indexOf(explanations[k]) === 0) return true;
                }

                // 括号说明（短内容）
                var hasOpenParen = lineTrimmed.indexOf('（') === 0 || lineTrimmed.indexOf('(') === 0;
                var hasCloseParen = lineTrimmed.indexOf('）') === lineTrimmed.length - 1 || lineTrimmed.indexOf(')') === lineTrimmed.length - 1;
                if (hasOpenParen && hasCloseParen && lineTrimmed.length < 100) return true;

                return false;
            }

            // 判断是否应该跳过大段英文内容
            function shouldSkipEnglishBlock(line) {
                if (!line || line.trim() === '') return false;

                var lineTrimmed = line.trim();
                var lineLower = line.toLowerCase();

                // 检查是否是纯英文行且包含AI相关关键词
                var englishAIPatterns = [
                    /thinking process/i,     // 思考过程
                    /creative process/i,     // 创意过程
                    /writing process/i,      // 写作过程
                    /analysis/i,            // 分析
                    /planning/i,           // 计划
                    /outline/i,             // 大纲
                    /draft/i,               // 草稿
                    /note/i,                // 笔记
                    /idea/i                 // 想法
                ];

                // 检查是否是纯英文或包含大量英文
                var hasChinese = /[\u4e00-\u9fa5]/.test(lineTrimmed);
                var isMostlyEnglish = !hasChinese || lineTrimmed.replace(/[a-zA-Z\s]/g, '').length < lineTrimmed.length / 2;

                // 如果大部分是英文且匹配AI模式，跳过
                if (isMostlyEnglish) {
                    for (var i = 0; i < englishAIPatterns.length; i++) {
                        if (englishAIPatterns[i].test(lineTrimmed)) return true;
                    }
                }

                return false;
            }

            // 判断是否是章节标题
            function isChapterTitle(line) {
                var lineTrimmed = line.trim();
                if (!lineTrimmed) return false;

                // 匹配：第一章、第二章 等
                var chapterMatch = lineTrimmed.match(/^第([一二三四五六七八九十]+)[章节部篇]/);
                if (chapterMatch) return true;

                // 匹配：第一篇、第二篇 等
                var chapterMatch2 = lineTrimmed.match(/^第([一二三四五六七八九十]+)[篇]/);
                if (chapterMatch2) return true;

                return false;
            }

            // 判断是否是章节结束后的解释性文字
            function isChapterExplanation(line) {
                var lineTrimmed = line.trim();
                if (!lineTrimmed) return false;

                // 章节结束后的解释性关键词
                var explanationKeywords = ['本章', '这一章', '本章内容', '这一章的内容',
                                     '本章小结', '小结', '本节', '这一节',
                                     '说明', '解释', '注：', '备注：',
                                     '注意：', '提示：', '总结',
                                     '本节介绍了', '本章介绍了',
                                     '这部分内容', '本部分',
                                     '这一部分', '以上内容'];

                for (var i = 0; i < explanationKeywords.length; i++) {
                    if (lineTrimmed.indexOf(explanationKeywords[i]) === 0) return true;
                }

                return false;
            }

            // 转换章节编号：第一章 -> 1
            function convertChapterNumber(line) {
                var lineTrimmed = line.trim();

                // 匹配：第一章、第二章 等
                var chapterMatch = lineTrimmed.match(/^第([一二三四五六七八九十]+)([章节部篇])/);

                if (chapterMatch) {
                    var chineseNum = chapterMatch[1];
                    var type = chapterMatch[2];

                    // 转换中文数字
                    var numStr = '';
                    for (var n = 0; n < chineseNum.length; n++) {
                        var char = chineseNum[n];
                        numStr += chineseToNum[char] || char;
                    }

                    return numStr;
                }

                return line;
            }

            function cleanArticle(text) {
                console.log('开始清理文章，文本长度: ' + text.length);

                var lines = text.split('\n');
                console.log('分割成 ' + lines.length + ' 行');

                var cleanedLines = [];
                var inIrrelevantSection = false;
                var inChapterExplanationSection = false;

                var totalLines = lines.length;
                var removedLines = 0;
                var convertedChapters = 0;

                for (var i = 0; i < lines.length; i++) {
                    try {
                        var line = lines[i];
                        var lineTrimmed = line.trim();

                        // 保留空行（但只保留最多2个连续空行）
                        if (!lineTrimmed) {
                            var lastNonEmpty = cleanedLines.length - 1;
                            var canAddEmpty = true;
                            while (lastNonEmpty >= 0 && !cleanedLines[lastNonEmpty].trim()) {
                                var emptyCount = 0;
                                var checkLine = lastNonEmpty;
                                while (checkLine >= 0 && !cleanedLines[checkLine].trim()) {
                                    emptyCount++;
                                    checkLine--;
                                    if (emptyCount >= 2) {
                                        canAddEmpty = false;
                                        break;
                                    }
                                }
                                break;
                            }
                            if (canAddEmpty) {
                                cleanedLines.push(line);
                            }
                            continue;
                        }

                        // 检查是否应该跳过英文大段
                        var shouldSkipEnglish = shouldSkipEnglishBlock(lineTrimmed);
                        if (shouldSkipEnglish) {
                            inIrrelevantSection = true;
                            removedLines++;
                            console.log('跳过英文内容: ' + lineTrimmed.substring(0, 40));
                            continue;
                        }

                        // 检查是否是章节标题
                        var isChapter = isChapterTitle(lineTrimmed);

                        // 如果是章节标题，退出解释性内容区域
                        if (isChapter) {
                            inChapterExplanationSection = false;
                            // 检查是否应该跳过此行（思考过程等的章节标题）
                            if (lineTrimmed.indexOf('思考') >= 0 || lineTrimmed.indexOf('创意') >= 0 ||
                                lineTrimmed.indexOf('过程') >= 0 || lineTrimmed.indexOf('思路') >= 0 ||
                                lineTrimmed.indexOf('Planning') >= 0 || lineTrimmed.indexOf('Draft') >= 0) {
                                inIrrelevantSection = true;
                                removedLines++;
                                console.log('跳过章节标题: ' + lineTrimmed);
                                continue;
                            }
                        }

                        // 检查是否应该跳过此行（其他规则）
                        var shouldSkip = shouldSkipLine(lineTrimmed);

                        if (shouldSkip) {
                            inIrrelevantSection = true;
                            removedLines++;
                            console.log('跳过第 ' + i + ' 行: ' + lineTrimmed.substring(0, 40));
                            continue;
                        }

                        // 检查是否是章节结束后的解释性文字
                        if (inChapterExplanationSection && isChapterExplanation(lineTrimmed)) {
                            removedLines++;
                            console.log('跳过章节解释: ' + lineTrimmed);
                            continue;
                        }

                        // 检查是否应该退出不相关区域（遇到章节标题）
                        if (inIrrelevantSection && isChapterTitle(lineTrimmed) && !isChapterExplanation(lineTrimmed)) {
                            inIrrelevantSection = false;
                            console.log('退出不相关区域: ' + lineTrimmed);
                        }

                        // 如果在不相关区域，继续跳过
                        if (inIrrelevantSection) {
                            removedLines++;
                            console.log('跳过(区域内) 第 ' + i + ' 行: ' + lineTrimmed.substring(0, 40));
                            continue;
                        }

                        // 转换章节编号
                        var originalLine = lineTrimmed;
                        var convertedLine = convertChapterNumber(lineTrimmed);

                        if (convertedLine !== originalLine) {
                            convertedChapters++;
                            console.log('转换章节: "' + originalLine + '" -> "' + convertedLine + '"');
                        }

                        // 如果是章节标题，进入解释性内容区域
                        if (isChapter && !inIrrelevantSection) {
                            inChapterExplanationSection = true;
                        }

                        // 保留原始缩进
                        var indent = '';
                        for (var k = 0; k < line.length; k++) {
                            if (line[k] === ' ' || line[k] === '\t') {
                                indent += line[k];
                            } else {
                                break;
                            }
                        }

                        cleanedLines.push(indent + convertedLine);

                    } catch (e) {
                        console.error('处理第 ' + i + ' 行时出错:', e);
                    }
                }

                console.log('清理完成，保留 ' + cleanedLines.length + ' 行');

                // 合并行并清理多余空行（确保只有最多2个连续空行）
                var result = cleanedLines.join('\n');
                result = result.replace(/\n\n\n\n+/g, '\n\n');

                return {
                    text: result,
                    stats: {
                        totalLines: totalLines,
                        removedLines: removedLines,
                        convertedChapters: convertedChapters
                    }
                };
            }

            function processArticle() {
                console.log('processArticle 函数被调用');

                var input = document.getElementById('inputTextarea');
                var output = document.getElementById('outputTextarea');
                var stats = document.getElementById('stats');

                if (!input) {
                    alert('找不到输入框');
                    return;
                }
                if (!output) {
                    alert('找不到输出框');
                    return;
                }

                var inputValue = input.value;
                console.log('输入内容长度: ' + inputValue.length);

                if (!inputValue.trim()) {
                    showToast('请输入原文！');
                    return;
                }

                try {
                    var result = cleanArticle(inputValue);
                    console.log('清理完成');

                    output.value = result.text;

                    document.getElementById('statTotal').textContent = result.stats.totalLines;
                    document.getElementById('statRemoved').textContent = result.stats.removedLines;
                    document.getElementById('statConverted').textContent = result.stats.convertedChapters;
                    stats.style.display = 'block';

                    showToast('清理完成！');
                    console.log('所有步骤完成');
                } catch (e) {
                    console.error('清理过程中出错:', e);
                    alert('清理出错: ' + e.message);
                }
            }

            function clearInput() {
                document.getElementById('inputTextarea').value = '';
                document.getElementById('outputTextarea').value = '';
                document.getElementById('stats').style.display = 'none';
                showToast('已清空');
            }

            function copyOutput() {
                var output = document.getElementById('outputTextarea');
                output.select();
                document.execCommand('copy');
                showToast('已复制到剪贴板！');
            }

            function downloadOutput() {
                var output = document.getElementById('outputTextarea').value;
                if (!output.trim()) {
                    showToast('没有可下载的内容！');
                    return;
                }
                var blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'cleaned_article.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('下载已开始！');
            }

            // 绑定事件
            document.getElementById('processBtn').addEventListener('click', processArticle);
            document.getElementById('clearBtn').addEventListener('click', clearInput);
            document.getElementById('copyBtn').addEventListener('click', copyOutput);
            document.getElementById('downloadBtn').addEventListener('click', downloadOutput);

            console.log('所有事件已绑定');
            console.log('AI文章清理工具初始化完成');

        } catch (e) {
            console.error('初始化出错:', e);
            alert('页面加载出错: ' + e.message);
        }
    })();
    </script>
</body>
</html>
