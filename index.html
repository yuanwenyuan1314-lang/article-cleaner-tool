<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文章清理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .panel { display: flex; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .panel-title { font-size: 1.3rem; font-weight: 600; color: #333; }
        .panel-actions { display: flex; gap: 10px; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.3s; font-weight: 500;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        textarea {
            flex: 1; min-height: 500px; padding: 15px;
            border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 1rem; line-height: 1.8; resize: none;
            transition: all 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        #inputTextarea { background: #f9fafb; }
        #outputTextarea { background: #f0fdf4; }
        .stats { margin-top: 15px; padding: 15px; background: #f3f4f6; border-radius: 8px; font-size: 0.9rem; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .stats-label { color: #6b7280; }
        .stats-value { font-weight: 600; color: #333; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 0.9rem; z-index: 1000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            textarea { min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI文章清理工具</h1>
            <p>粘贴原文，自动清理不相关内容并统一章节编号</p>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">输入原文</div>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" onclick="window.clearInput()">清空</button>
                        <button class="btn btn-primary" onclick="window.processArticle()">清理文章</button>
                    </div>
                </div>
                <textarea id="inputTextarea" placeholder="在这里粘贴原文..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">清理结果</div>
                    <div class="panel-actions">
                        <button class="btn btn-secondary" onclick="window.copyOutput()">复制</button>
                        <button class="btn btn-success" onclick="window.downloadOutput()">下载</button>
                    </div>
                </div>
                <textarea id="outputTextarea" placeholder="清理后的文章将显示在这里..." readonly></textarea>

                <div class="stats" id="stats" style="display: none;">
                    <div class="stats-row">
                        <span class="stats-label">总行数:</span>
                        <span class="stats-value" id="statTotal">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">删除行数:</span>
                        <span class="stats-value" id="statRemoved">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">转换章节:</span>
                        <span class="stats-value" id="statConverted">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 工具函数
        function showToast(message) {
            var toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }

        function processArticle() {
            var input = document.getElementById('inputTextarea');
            var output = document.getElementById('outputTextarea');
            var stats = document.getElementById('stats');

            if (!input || !output) {
                alert('页面元素加载错误');
                return;
            }

            var inputValue = input.value;

            if (!inputValue.trim()) {
                showToast('请输入原文！');
                return;
            }

            var result = cleanArticle(inputValue);

            output.value = result.text;

            document.getElementById('statTotal').textContent = result.stats.totalLines;
            document.getElementById('statRemoved').textContent = result.stats.removedLines;
            document.getElementById('statConverted').textContent = result.stats.convertedChapters;

            stats.style.display = 'block';

            showToast('清理完成！');
        }

        function cleanArticle(text) {
            var stats = {
                totalLines: 0,
                removedLines: 0,
                convertedChapters: 0
            };

            var lines = text.split('\n');
            var cleanedLines = [];
            var inIrrelevantSection = false;

            stats.totalLines = lines.length;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                var lineTrimmed = line.trim();

                if (!lineTrimmed) {
                    cleanedLines.push(line);
                    continue;
                }

                var shouldSkip = shouldSkipLine(lineTrimmed);

                if (shouldSkip) {
                    inIrrelevantSection = true;
                    stats.removedLines++;
                    continue;
                }

                if (inIrrelevantSection && shouldExitSkip(lineTrimmed)) {
                    inIrrelevantSection = false;
                }

                if (inIrrelevantSection) {
                    stats.removedLines++;
                    continue;
                }

                var convertedLine = convertChapterNumber(lineTrimmed);
                if (convertedLine !== lineTrimmed) {
                    stats.convertedChapters++;
                }

                var indent = line.length - line.length.trimLeft();
                cleanedLines.push(Array(indent + 1).join(' ') + convertedLine);
            }

            var result = cleanedLines.join('\n');
            result = result.replace(/\n{3,}/g, '\n\n');

            return { text: result, stats: stats };
        }

        function shouldSkipLine(line) {
            if (/^【.*?】.*$/.test(line)) return true;
            if (/^\*+\s*思考\s*\*+/.test(line)) return true;
            if (/^\*+\s*创意\s*\*+/.test(line)) return true;
            if (/^#+\s*思考过程\s*$/.test(line)) return true;
            if (/^#+\s*写作思路\s*$/.test(line)) return true;
            if (/^#+\s*创作理念\s*$/.test(line)) return true;
            if (/^\s*思考：\s*$/.test(line)) return true;
            if (/^\s*创意说明：\s*$/.test(line)) return true;
            if (/^\s*写作说明：\s*$/.test(line)) return true;
            if (/^\s*补充说明：\s*$/.test(line)) return true;
            if (/^\s*(这是一个|这是一个关于|以上是|这里我)/.test(line)) return true;
            if (/^\s*(这段话旨在|这段内容主要|本段)/.test(line)) return true;
            if (/^\s*(通过以上|综上所述|总之|简而言之|总而言之)/.test(line)) return true;
            if (/^\s*(需要注意的是|需要说明的是|值得注意的是)/.test(line)) return true;
            if (/^\s*[（\(].*?[）\)]\s*$/.test(line) && line.length < 100) return true;
            if (/^\s*(根据您的要求|基于以上|我会|让我|好的|当然|当然可以)/.test(line)) return true;
            if (/(希望能对您有所帮助|希望这篇文章|希望这些内容|供您参考|仅供参考)\s*[。！？]?$/.test(line)) return true;
            return false;
        }

        function shouldExitSkip(line) {
            return /^第[一二三四五六七八九十]+[章节部篇]/.test(line);
        }

        function convertChapterNumber(line) {
            var chineseNumbers = {
                '一': '1', '二': '2', '三': '3', '四': '4',
                '五': '5', '六': '6', '七': '7', '八': '8',
                '九': '9', '十': '10'
            };

            return line.replace(/^(第([一二三四五六七八九十]+)([章节部篇]))/, function(match, full, num, type) {
                var result = '';
                for (var j = 0; j < num.length; j++) {
                    var char = num[j];
                    result += chineseNumbers[char] || char;
                }
                return result + '、';
            });
        }

        function clearInput() {
            document.getElementById('inputTextarea').value = '';
            document.getElementById('outputTextarea').value = '';
            document.getElementById('stats').style.display = 'none';
            showToast('已清空');
        }

        function copyOutput() {
            var output = document.getElementById('outputTextarea');
            output.select();
            document.execCommand('copy');
            showToast('已复制到剪贴板！');
        }

        function downloadOutput() {
            var output = document.getElementById('outputTextarea').value;
            if (!output.trim()) {
                showToast('没有可下载的内容！');
                return;
            }
            var blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'cleaned_article.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('下载已开始！');
        }

        // 全局暴露
        window.processArticle = processArticle;
        window.clearInput = clearInput;
        window.copyOutput = copyOutput;
        window.downloadOutput = downloadOutput;

        // 初始化
        console.log('AI文章清理工具已加载');
        console.log('processArticle 函数:', typeof processArticle);
    </script>
</body>
</html>
